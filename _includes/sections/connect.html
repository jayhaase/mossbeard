{% assign connect = site.data.site.sections.connect %}
<section id="connect" class="section-connect">
  <div class="container container--centered">
    <h2>{{ connect.title }}</h2>
    <div class="divider" aria-hidden="true">❧</div>
    <p>{{ connect.body }}</p>
    <a href="{{ site.data.site.facebook_url }}" target="_blank" rel="noopener" class="cta-btn">{{ connect.cta }}</a>
  </div>
</section>
